<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpLiftClean | Official Storefront</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f4f4f5; }
        .feature-btn { background: white; border: 1px solid #e4e4e7; border-radius: 12px; padding: 12px; font-size: 12px; font-weight: 600; text-align: center; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="pb-10">
    <div class="max-w-md mx-auto p-4">
        <!-- Header -->
        <header class="mb-6">
            <h1 class="text-3xl font-bold text-slate-900">UpLiftClean</h1>
            <p class="text-sm text-slate-500">Natural Purity, Powerful Opportunity.</p>
        </header>

        <!-- Utility Navigation Grid -->
        <div class="grid grid-cols-2 gap-3 mb-8">
            <button class="feature-btn">Customer Service</button>
            <button class="feature-btn">Search Products</button>
            <button class="feature-btn">Track Order</button>
            <button class="feature-btn">View My Cart</button>
        </div>

        <!-- Product Grid (Same as before) -->
        <div class="space-y-4">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                <img src="thecompleteset.png" class="w-full h-48 object-cover rounded-xl mb-4">
                <h4 class="font-bold text-sm">The Complete Set</h4>
                <div class="mt-4 flex gap-2">
                    <button class="flex-1 bg-slate-900 text-white py-3 rounded-lg text-xs font-bold">Add to Cart</button>
                    <button class="flex-1 bg-emerald-700 text-white py-3 rounded-lg text-xs font-bold">Buy Now</button>
                </div>
            </div>
        </div>

        <!-- Admin-Controlled Testimonials Section -->
        <div class="mt-10">
            <h3 class="text-lg font-bold mb-4 text-slate-900">Customer Reviews</h3>
            <div id="testimonial-list" class="space-y-4">
                <!-- Example Testimonial (Admin can remove this div) -->
                <div id="review-1" class="bg-white p-4 rounded-xl border border-slate-200">
                    <p class="text-xs text-slate-600 mb-2">"Absolutely love the laundry booster! My clothes have never been cleaner."</p>
                    <p class="text-[10px] font-bold text-slate-400">— Sarah M.</p>
                    <!-- Admin Delete Button (Only visible if you know the secret) -->
                    <button onclick="document.getElementById('review-1').remove()" class="mt-3 text-[9px] text-red-500 hover:underline">Remove Review</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
