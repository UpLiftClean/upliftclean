<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpLiftClean | Shop Organic Laundry Care</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#F6F6F6] text-slate-900 antialiased min-h-screen flex flex-col items-center"> 

<div id="app" class="w-full max-w-md bg-white min-h-screen shadow-xl flex flex-col relative pb-24"> 

    <div class="bg-emerald-800 text-white text-[9px] font-medium px-4 py-1 flex justify-between items-center">
        <span>🌐 Shipping Globally to Your Doorstep</span>
    </div> 

    <header id="main-header" class="bg-white px-4 pt-3 pb-4 sticky top-0 z-50 border-b border-slate-100">
        <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-3">
                <img src="1780000331883.png" alt="Logo" class="w-16 h-16 object-contain rounded-xl border border-slate-100 p-0.5">
                <span class="font-bold text-2xl text-slate-900 tracking-tight">UpLiftClean</span>
            </div>
            <button type="button" onclick="showView('cart-view')" class="p-2 bg-slate-50 rounded-full relative">🛒 <span id="cart-count" class="absolute -top-1 -right-1 bg-emerald-600 text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span></button>
        </div>
        <input type="text" id="search-input" placeholder="Search..." class="w-full bg-slate-100 text-sm px-4 py-3 rounded-full border border-transparent focus:bg-white focus:border-slate-300 outline-none">
    </header> 

    <main id="main-view" class="flex-1 overflow-y-auto">
        <div id="home-view">
            <div class="p-4"><div class="bg-gradient-to-r from-emerald-700 to-teal-800 text-white p-5 rounded-2xl shadow-sm"><h2 class="text-xl font-bold">Organic & Natural</h2></div></div>
            <div class="px-4 pb-6 grid grid-cols-4 gap-2">
                <div onclick="filterProducts('laundry')" class="bg-slate-50 p-2 text-center rounded-xl cursor-pointer"><div class="text-lg">🧼</div><span class="text-[9px] font-bold">Laundry Soap</span></div>
                <div class="bg-slate-50 p-2 text-center rounded-xl"><div class="text-lg">🧴</div><span class="text-[9px] font-bold text-emerald-700">COMING SOON</span></div>
                <div class="bg-slate-50 p-2 text-center rounded-xl"><div class="text-lg">🪵</div><span class="text-[9px] font-bold text-emerald-700">COMING SOON</span></div>
                <div class="bg-slate-50 p-2 text-center rounded-xl"><div class="text-lg">📦</div><span class="text-[9px] font-bold text-emerald-700">COMING SOON</span></div>
            </div>
            <div class="px-4"><div id="product-grid" class="grid grid-cols-2 gap-3"></div></div>
        </div>

        <div id="list-view" class="hidden p-4">
            <button type="button" onclick="showView('home-view')" class="text-emerald-800 font-bold mb-4">← Back</button>
            <div id="list-items"></div>
        </div>

        <div id="product-detail-view" class="hidden p-4">
            <button type="button" onclick="showView('home-view')" class="text-emerald-800 font-bold mb-4">← Back</button>
            <div id="detail-content"></div>
        </div>

        <div id="story-view" class="hidden p-6">
            <h2 class="font-bold text-2xl mb-4">Our Story</h2>
            <p class="text-slate-600 text-sm">UpLiftClean started from humble beginnings to help families thrive with organic products and global direct sales opportunities.</p>
            <button type="button" onclick="showView('home-view')" class="mt-8 text-emerald-800 font-bold underline">← Back to Home</button>
        </div>

        <div id="cart-view" class="hidden p-4">
            <h2 class="font-bold text-lg mb-4">Your Cart</h2>
            <div id="cart-items-list"></div>
            <button type="button" onclick="showView('home-view')" class="mt-4 text-slate-500 underline">Back to Shopping</button>
        </div>
    </main>

    <nav class="absolute bottom-0 left-0 right-0 h-20 bg-white border-t flex items-center justify-around px-2">
        <a href="https://m.me/upliftcleanofficial" target="_blank" class="text-[10px] text-center font-bold text-emerald-700">🎧 Service</a>
        <a href="https://www.facebook.com/upliftcleanofficial" target="_blank" class="text-[10px] text-center font-bold text-slate-400">👥 Join</a>
        <button type="button" onclick="showView('story-view')" class="text-[10px] text-center font-bold text-slate-400">🌱 Our Story</button>
    </nav>
</div>

<script>
    const productData = {
        'set': { name: 'The Pure Power Set', price: 7.99, img: 'thecompleteset.png', desc: 'Experience the ultimate laundry transformation.', cat: 'laundry' },
        'soap': { name: 'Pure Prime Saponin Soap', price: 4.99, img: 'pureprime.jpg', desc: 'Our pure, organic saponin-based soap.', cat: 'laundry' },
        'booster': { name: 'Pure Plus Laundry Booster', price: 4.49, img: 'pureplus.jpg', desc: 'A powerful, all-natural laundry booster.', cat: 'laundry' }
    };

    function showView(viewId) {
        document.getElementById('home-view').classList.add('hidden');
        document.getElementById('list-view').classList.add('hidden');
        document.getElementById('product-detail-view').classList.add('hidden');
        document.getElementById('story-view').classList.add('hidden');
        document.getElementById('cart-view').classList.add('hidden');
        document.getElementById(viewId).classList.remove('hidden');
    }

    // INTERCEPT BACK BUTTON
    window.addEventListener('popstate', function(event) {
        history.pushState(null, null, document.URL);
        showView('home-view');
    });
    history.pushState(null, null, document.URL);

    function renderProducts() {
        document.getElementById('product-grid').innerHTML = Object.keys(productData).map(id => `
            <div class="border rounded-2xl p-3 bg-white">
                <img src="${productData[id].img}" onclick="showDetail('${id}')" class="h-24 mx-auto cursor-pointer">
                <h4 class="font-bold text-xs mt-2">${productData[id].name}</h4>
                <button type="button" onclick="alert('Added!')" class="w-full bg-slate-900 text-white text-[10px] py-1 mt-2 rounded">Add</button>
            </div>
        `).join('');
    }

    function showDetail(id) {
        document.getElementById('detail-content').innerHTML = `<h2 class="font-bold text-lg">${productData[id].name}</h2><p class="text-sm">${productData[id].desc}</p>`;
        showView('product-detail-view');
    }

    function filterProducts(cat) {
        showView('list-view');
        document.getElementById('list-items').innerHTML = 'Filtered view active.';
    }

    renderProducts();
</script>
</body>
</html>
