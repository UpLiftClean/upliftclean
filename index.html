<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpLiftClean Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F6F6F6] p-4">
    <div class="max-w-md mx-auto bg-white shadow-lg rounded-2xl p-4">
        <h1 class="font-bold text-xl mb-4">UpLiftClean Command Center</h1>
        
        <!-- Product Grid -->
        <div class="grid grid-cols-1 gap-4">
            <!-- Product 1 -->
            <div class="border rounded-2xl p-3 bg-white">
                <img src="1000052415.png" class="w-full h-32 object-contain bg-slate-50 rounded-lg">
                <h4 class="font-bold text-sm mt-2">The Pure Power Set</h4>
                <a href="https://m.me/upliftcleanofficial" class="block text-center bg-emerald-700 text-white text-xs py-2 mt-2 rounded-lg">Order via Messenger</a>
            </div>
            <!-- Repeat similar blocks for other products using their specific filenames -->
        </div>

        <!-- Secret Sample Module -->
        <div class="mt-6 p-4 bg-slate-50 rounded-xl border border-dashed border-slate-300">
            <label class="text-[10px] font-bold text-slate-500 uppercase">Secret Sample Code</label>
            <input type="text" id="secret-code" placeholder="Enter Code" class="w-full text-sm px-3 py-2 rounded-lg border my-2">
            <button onclick="processSecretSample()" class="w-full bg-slate-900 text-white text-xs py-2 rounded-lg">Apply Secret Code</button>
        </div>
    </div>

    <script>
        function processSecretSample() {
            if (document.getElementById('secret-code').value === "UPLIFT-SAMPLE-2026") {
                alert("Code Accepted. Redirecting to Packing Slip...");
                // Logic to show receipt/packing slip
            } else {
                alert("Invalid Code.");
            }
        }
    </script>
</body>
</html>
