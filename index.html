<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpLiftClean | Official Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#F6F6F6] text-slate-900 antialiased min-h-screen flex flex-col items-center">

    <div class="w-full max-w-md bg-white min-h-screen shadow-2xl flex flex-col relative pb-24">
        
        <!-- Utility Banner: Fortune 500 Standard -->
        <div class="bg-emerald-800 text-white text-[10px] font-bold uppercase tracking-wider px-4 py-2 flex justify-between items-center">
            <span>🌐 Shipping Globally to Your Doorstep</span>
        </div>

        <!-- Header -->
        <header class="bg-white px-4 pt-3 pb-4 sticky top-0 z-50 border-b border-slate-100">
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-2.5 cursor-pointer" onclick="handleHeaderTap()">
                    <img src="1780000331883.png" alt="Logo" class="w-9 h-9 object-contain rounded-lg border border-slate-100 p-0.5">
                    <span class="font-bold text-xl text-slate-900 tracking-tight">UpLiftClean</span>
                </div>
                <button onclick="toggleCart()" class="p-2 bg-slate-50 rounded-full relative">🛒 <span id="cart-count" class="absolute -top-1 -right-1 bg-emerald-600 text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center">0</span></button>
            </div>
        </header>

        <!-- Main Product Grid -->
        <main id="main-content" class="flex-1 overflow-y-auto p-4">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Our Organic Lineup</h3>
            <div class="grid grid-cols-2 gap-3">
                <!-- Product 1 -->
                <div class="border border-slate-100 rounded-2xl bg-white p-3 shadow-sm flex flex-col justify-between">
                    <img src="thecompleteset.png" alt="The Pure Power Set" class="h-32 w-full object-contain aspect-square mb-3">
                    <h4 class="font-bold text-xs">The Pure Power Set</h4>
                    <div class="font-bold text-sm my-1">$7.99 USD</div>
                    <button onclick="addToCart('The Pure Power Set', 7.99)" class="w-full bg-slate-900 text-white text-[10px] py-2 rounded-lg">Add to Cart</button>
                </div>
                <!-- Product 2 -->
                <div class="border border-slate-100 rounded-2xl bg-white p-3 shadow-sm flex flex-col justify-between">
                    <img src="pureprime.jpg" alt="Pure Prime Saponin Soap" class="h-32 w-full object-contain aspect-square mb-3">
                    <h4 class="font-bold text-xs">Pure Prime Saponin Soap</h4>
                    <div class="font-bold text-sm my-1">$4.99 USD</div>
                    <button onclick="addToCart('Pure Prime Soap', 4.99)" class="w-full bg-slate-900 text-white text-[10px] py-2 rounded-lg">Add to Cart</button>
                </div>
                <!-- Product 3 -->
                <div class="border border-slate-100 rounded-2xl bg-white p-3 shadow-sm flex flex-col justify-between">
                    <img src="Pureplus.jpg" alt="Pure Plus Laundry Booster" class="h-32 w-full object-contain aspect-square mb-3">
                    <h4 class="font-bold text-xs">Pure Plus Laundry Booster</h4>
                    <div class="font-bold text-sm my-1">$4.49 USD</div>
                    <button onclick="addToCart('Pure Plus Booster', 4.49)" class="w-full bg-slate-900 text-white text-[10px] py-2 rounded-lg">Add to Cart</button>
                </div>
            </div>
        </main>

        <!-- Cart View -->
        <div id="cart-view" class="hidden flex-1 p-6">
            <h2 class="text-lg font-bold mb-4">Your Shopping Cart</h2>
            <div id="cart-items" class="space-y-2 mb-6"></div>
            <a href="https://m.me/upliftcleanofficial" class="block bg-blue-600 text-white text-center py-3 rounded-xl font-bold">Checkout via Messenger</a>
            <button onclick="toggleCart()" class="text-slate-500 underline text-xs mt-4">Back to Shop</button>
        </div>
    </div>

    <script>
        let tapCount = 0;
        function handleHeaderTap() {
            tapCount++;
            if (tapCount === 3) {
                const code = prompt("Admin Access:");
                if (code === "ADMIN2026") alert("Admin Portal Unlocked");
                tapCount = 0;
            }
        }
        function toggleCart() {
            document.getElementById('main-content').classList.toggle('hidden');
            document.getElementById('cart-view').classList.toggle('hidden');
        }
        function addToCart(name, price) {
            let count = parseInt(document.getElementById('cart-count').innerText) + 1;
            document.getElementById('cart-count').innerText = count;
            document.getElementById('cart-items').innerHTML += `<div class="p-2 border rounded text-xs font-bold">${name} - $${price}</div>`;
        }
    </script>
</body>
</html>
