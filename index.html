<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpLiftClean | Shop Organic Laundry Care</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#F6F6F6] text-slate-900 antialiased min-h-screen flex flex-col items-center">

    <div id="shop-view" class="w-full max-w-md bg-white min-h-screen shadow-xl flex flex-col relative pb-24">
        <!-- Header -->
        <header class="bg-white px-4 pt-3 pb-4 border-b border-slate-100">
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-2.5 cursor-pointer" onclick="handleHeaderTap()">
                    <img src="1780000331883.png" alt="Logo" class="w-9 h-9 object-contain rounded-lg border border-slate-100 p-0.5">
                    <span class="font-bold text-xl text-slate-900 tracking-tight">UpLiftClean</span>
                </div>
                <button onclick="toggleView()" class="p-2 bg-slate-50 rounded-full relative">🛒 <span id="cart-count" class="absolute -top-1 -right-1 bg-emerald-600 text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center">0</span></button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4">
            <h3 class="text-sm font-bold text-slate-900 mb-3">Our Organic Lineup</h3>
            <div class="grid grid-cols-2 gap-3">
                <!-- 1. Pure Power Set -->
                <div class="border rounded-2xl bg-white p-3 shadow-sm">
                    <img src="1000052415.png" class="h-32 object-contain w-full mb-2">
                    <h4 class="font-bold text-xs">The Pure Power Set</h4>
                    <div class="font-bold text-sm my-2">$7.99 USD</div>
                    <button onclick="addToCart('The Pure Power Set', 7.99)" class="w-full bg-slate-900 text-white text-[10px] py-2 rounded-lg">Add to Cart</button>
                </div>
                <!-- 2. Pure Prime Soap -->
                <div class="border rounded-2xl bg-white p-3 shadow-sm">
                    <img src="1000052416.jpg" class="h-32 object-contain w-full mb-2">
                    <h4 class="font-bold text-xs">Pure Prime Saponin Soap</h4>
                    <div class="font-bold text-sm my-2">$4.99 USD</div>
                    <button onclick="addToCart('Pure Prime Soap', 4.99)" class="w-full bg-slate-900 text-white text-[10px] py-2 rounded-lg">Add to Cart</button>
                </div>
                <!-- 3. Pure Plus Booster -->
                <div class="border rounded-2xl bg-white p-3 shadow-sm">
                    <img src="1000052417.jpg" class="h-32 object-contain w-full mb-2">
                    <h4 class="font-bold text-xs">Pure Plus Laundry Booster</h4>
                    <div class="font-bold text-sm my-2">$4.49 USD</div>
                    <button onclick="addToCart('Pure Plus Booster', 4.49)" class="w-full bg-slate-900 text-white text-[10px] py-2 rounded-lg">Add to Cart</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Cart View -->
    <div id="cart-view" class="hidden w-full max-w-md bg-white min-h-screen p-6">
        <h2 class="text-xl font-bold mb-4">Your Cart</h2>
        <div id="cart-items" class="space-y-3 mb-6"></div>
        <a href="https://m.me/upliftcleanofficial" class="block bg-blue-600 text-white text-center py-3 rounded-xl font-bold">Checkout via Messenger</a>
        <button onclick="toggleView()" class="mt-4 text-xs text-slate-500 underline">Back to Shop</button>
    </div>

    <script>
        let tapCount = 0;
        function handleHeaderTap() {
            tapCount++;
            if (tapCount === 3) {
                const code = prompt("Enter Admin Code:");
                if (code === "ADMIN2026") alert("Admin Access Granted");
                tapCount = 0;
            }
        }
        function toggleView() {
            document.getElementById('shop-view').classList.toggle('hidden');
            document.getElementById('cart-view').classList.toggle('hidden');
        }
        let cart = [];
        function addToCart(name, price) {
            cart.push({name, price});
            document.getElementById('cart-count').innerText = cart.length;
            const items = document.getElementById('cart-items');
            items.innerHTML += `<div class="p-3 border rounded text-xs font-bold">${name} - $${price}</div>`;
        }
    </script>
</body>
</html>
