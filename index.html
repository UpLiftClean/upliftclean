<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpLiftClean | Official Storefront</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f4f4f5; }
        .feature-btn { background: white; border: 1px solid #e4e4e7; border-radius: 12px; padding: 12px; font-size: 12px; font-weight: 600; text-align: center; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="pb-10">
    <div class="max-w-md mx-auto p-4">
        <!-- Header -->
        <header class="mb-6">
            <h1 class="text-3xl font-bold text-slate-900">UpLiftClean</h1>
            <p class="text-sm text-slate-500">Natural Purity, Powerful Opportunity.</p>
        </header>

        <!-- Utility Navigation Grid -->
        <div class="grid grid-cols-2 gap-3 mb-8">
            <button class="feature-btn">Customer Service</button>
            <button class="feature-btn">Search Products</button>
            <button class="feature-btn">Track Order</button>
            <button class="feature-btn">View My Cart</button>
        </div>

        <!-- Product Grid -->
        <div class="space-y-4">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                <img src="thecompleteset.png" class="w-full h-48 object-cover rounded-xl mb-4">
                <h4 class="font-bold text-sm">The Complete Set</h4>
                <div class="mt-4 flex gap-2">
                    <button class="flex-1 bg-slate-900 text-white py-3 rounded-lg text-xs font-bold">Add to Cart</button>
                    <button class="flex-1 bg-emerald-700 text-white py-3 rounded-lg text-xs font-bold">Buy Now</button>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                    <img src="pureprime.jpg" class="w-full h-32 object-cover rounded-xl mb-4">
                    <h4 class="font-bold text-xs">Pure Prime Soap</h4>
                    <button class="w-full bg-slate-900 text-white py-2 mt-3 rounded-lg text-[10px] font-bold">Add to Cart</button>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                    <img src="pureplus.jpg" class="w-full h-32 object-cover rounded-xl mb-4">
                    <h4 class="font-bold text-xs">Pure Plus Booster</h4>
                    <button class="w-full bg-slate-900 text-white py-2 mt-3 rounded-lg text-[10px] font-bold">Add to Cart</button>
                </div>
            </div>
        </div>

        <!-- Secret Sample Code Module -->
        <div class="mt-8 p-6 bg-white rounded-2xl border border-dashed border-slate-300">
            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Secret Sample Code</label>
            <input type="text" id="secret-code" placeholder="Enter Code" class="w-full text-sm px-4 py-3 rounded-xl border border-slate-200 mb-3">
            <button onclick="alert('Checking...')" class="w-full bg-slate-900 text-white text-xs py-3 rounded-xl font-bold">Apply Secret Code</button>
        </div>
    </div>
</body>
</html>
