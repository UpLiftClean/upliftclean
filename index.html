<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpLiftClean | Official Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Track User Data
        function logVisitor() {
            const visitorData = {
                timestamp: new Date().toISOString(),
                // In a production environment, these would be captured via API/Form
                email: "Pending Capture",
                country: "Pending Detection",
                gender: "Pending Selection"
            };
            console.log("Visitor tracked:", visitorData);
        }
        window.onload = logVisitor;

        // Admin Access
        let tapCount = 0;
        function handleHeaderTap() {
            tapCount++;
            if (tapCount === 3) {
                const code = prompt("Enter Admin Code:");
                if (code === "ADMIN2026") {
                    alert("Admin Portal Access Granted");
                    // Redirect to admin.html
                }
                tapCount = 0;
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Global Shipping Banner -->
    <div class="bg-emerald-900 text-white text-center py-2 text-xs font-bold">
        🌐 Global Shipping Available to Your Doorstep
    </div>

    <!-- Header -->
    <header class="bg-white p-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2 cursor-pointer" onclick="handleHeaderTap()">
            <span class="font-bold text-xl">UpLiftClean</span>
        </div>
        <button class="p-2 bg-gray-100 rounded-full">🛒 <span id="cart-count">0</span></button>
    </header>

    <!-- Product Grid -->
    <main class="p-4 grid grid-cols-2 gap-4">
        <!-- Complete Set -->
        <div class="bg-white p-4 rounded-2xl border border-gray-200">
            <img src="thecompleteset.png" class="w-full h-32 object-contain mb-3">
            <h2 class="font-bold text-sm">The Pure Power Set</h2>
            <p class="text-sm font-semibold mb-3">$7.99 USD</p>
            <button class="w-full bg-slate-900 text-white py-2 rounded-lg text-xs font-bold hover:bg-slate-800">Add to Cart</button>
        </div>
        <!-- Soap -->
        <div class="bg-white p-4 rounded-2xl border border-gray-200">
            <img src="pureprime.jpg" class="w-full h-32 object-contain mb-3">
            <h2 class="font-bold text-sm">Pure Prime Saponin Soap</h2>
            <p class="text-sm font-semibold mb-3">$4.99 USD</p>
            <button class="w-full bg-slate-900 text-white py-2 rounded-lg text-xs font-bold hover:bg-slate-800">Add to Cart</button>
        </div>
        <!-- Booster -->
        <div class="bg-white p-4 rounded-2xl border border-gray-200">
            <img src="Pureplus.jpg" class="w-full h-32 object-contain mb-3">
            <h2 class="font-bold text-sm">Pure Plus Laundry Booster</h2>
            <p class="text-sm font-semibold mb-3">$4.49 USD</p>
            <button class="w-full bg-slate-900 text-white py-2 rounded-lg text-xs font-bold hover:bg-slate-800">Add to Cart</button>
        </div>
    </main>
</body>
</html>
