<div class="grid grid-cols-2 gap-2">
    <div>
        <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1">Qty</label>
        <select class="w-full border border-slate-200 rounded-xl p-3 bg-white text-xs focus:outline-emerald-600">
            <option>1 Pack</option>
            <option>2 Packs</option>
            <option>Case Pack (6 Units)</option>
        </select>
    </div>
    <div>
        <!-- Updated Country Selector -->
        <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1">Destination</label>
        <select id="countrySelect" onchange="calculateShipping()" class="w-full border border-slate-200 rounded-xl p-3 bg-white text-xs focus:outline-emerald-600">
            <option value="0">Select Country</option>
            <option value="150">Philippines (PHP 150)</option>
            <option value="500">United States (USD 9)</option>
            <option value="650">United Kingdom (GBP 12)</option>
            <option value="600">Australia (AUD 15)</option>
            <option value="400">Singapore (SGD 8)</option>
        </select>
    </div>
</div>

<!-- Shipping Display Area -->
<div id="shippingDisplay" class="hidden bg-emerald-50 border border-emerald-100 p-3 rounded-xl mt-2">
    <div class="flex justify-between items-center text-xs">
        <span class="font-medium text-emerald-800">Est. Shipping (500g):</span>
        <span id="shippingCost" class="font-bold text-emerald-900"></span>
    </div>
</div>

<script>
    function calculateShipping() {
        const select = document.getElementById('countrySelect');
        const display = document.getElementById('shippingDisplay');
        const costSpan = document.getElementById('shippingCost');
        
        if (select.value === "0") {
            display.classList.add('hidden');
        } else {
            display.classList.remove('hidden');
            // Assuming the value attribute is the cost in local currency/placeholder
            costSpan.innerText = select.options[select.selectedIndex].text.split('(')[1].replace(')', '');
        }
    }
</script>
