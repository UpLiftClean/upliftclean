<!-- Add this script to your existing page -->
<script>
    // Only shows the delete buttons when the admin code is typed
    function revealAdminControls() {
        const code = prompt("Enter Admin Code:");
        if (code === "ADMIN2026") {
            document.querySelectorAll('.admin-delete').forEach(el => el.classList.remove('hidden'));
        }
    }
</script>

<!-- Update your Testimonial Section like this -->
<div class="mt-10">
    <h3 class="text-lg font-bold mb-4 text-slate-900" onclick="revealAdminControls()">Customer Reviews</h3>
    <div id="testimonial-list" class="space-y-4">
        
        <div id="review-1" class="bg-white p-4 rounded-xl border border-slate-200">
            <p class="text-xs text-slate-600 mb-2">"Absolutely love the laundry booster!"</p>
            <p class="text-[10px] font-bold text-slate-400">— Sarah M.</p>
            
            <!-- This is now HIDDEN by default -->
            <button onclick="document.getElementById('review-1').remove()" class="admin-delete hidden mt-3 text-[9px] text-red-500 hover:underline">
                Remove Review
            </button>
        </div>
        
    </div>
</div>
