<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpLiftClean | Shop Organic Laundry Care</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex flex-col items-center">

<div id="app" class="w-full max-w-md bg-white min-h-screen relative pb-20 shadow-xl">
    <header class="p-4 border-b sticky top-0 bg-white z-50">
        <div class="flex justify-between items-center mb-3">
            <img src="1780000331883.png" class="w-12">
            <button onclick="view('cart')">🛒<span id="cc">0</span></button>
        </div>
        <input id="s" onkeypress="hS(event)" placeholder="Search..." class="w-full bg-slate-100 p-2 rounded-full">
    </header>

    <main id="m" class="p-4">
        <div id="home">
            <div class="bg-emerald-800 text-white p-4 rounded-xl mb-4 text-sm font-bold">NATURAL PURITY, POWERFUL OPPORTUNITY</div>
            
            <div class="grid grid-cols-4 gap-2 mb-6" id="cats">
                <div class="text-center cursor-pointer" onclick="filterCategory('laundry')">🧼<p class="text-[9px]">Laundry Soap</p></div>
                <div class="text-center">🧴<p class="text-[9px]">Personal Care</p><p class="text-[8px] text-emerald-700">COMING SOON</p></div>
                <div class="text-center">🪵<p class="text-[9px]">Booster</p></div>
                <div class="text-center">📦<p class="text-[9px]">Bundles</p></div>
            </div>

            <div id="prod" class="grid grid-cols-2 gap-3"></div>
        </div>

        <div id="search" class="hidden">
            <h2 id="st" class="font-bold mb-4"></h2>
            <div id="sl"></div>
            <button onclick="clearS()" class="mt-4 underline">← Back</button>
        </div>
    </main>

    <div id="det" class="hidden p-4">
        <button onclick="history.back()" class="text-emerald-800 font-bold">← Back</button>
        <div id="dc"></div>
    </div>

    <div id="cart" class="hidden p-4">
        <div id="cl"></div>
        <p id="ct" class="font-bold mt-4"></p>
        <button onclick="history.back()" class="mt-4 text-slate-500 underline">Back to Shopping</button>
    </div>

    <div id="mod" class="hidden absolute inset-0 bg-black/50 flex items-center p-4">
        <div class="bg-white p-6 rounded-xl w-full">
            <div id="mc"></div>
            <button id="mb" class="w-full bg-emerald-700 text-white p-3 rounded-lg mt-4">Confirm & Add</button>
            <button onclick="mod.classList.add('hidden')" class="w-full mt-2 text-slate-500">Cancel</button>
        </div>
    </div>
</div>

<script>
    let c = JSON.parse(localStorage.getItem('c')) || [];
    const d = {
        'set': { n: 'Pure Power Set', p: 7.99, i: 'thecompleteset.png', cat: 'laundry' },
        'soap': { n: 'Pure Prime Soap', p: 4.99, i: 'pureprime.jpg', cat: 'laundry' },
        'booster': { n: 'Pure Plus Booster', p: 4.49, i: 'pureplus.jpg', cat: 'laundry' }
    };

    const view = (v) => {
        ['home', 'search', 'det', 'cart'].forEach(id => document.getElementById(id).classList.add('hidden'));
        document.getElementById(v).classList.remove('hidden');
        if (v == 'cart') uC();
    };

    const rH = (items = d) => {
        prod.innerHTML = Object.keys(items).map(k => `
            <div class="border p-2 rounded-xl">
                <img src="${items[k].i}" onclick="sD('${k}')" class="cursor-pointer">
                <p class="text-xs font-bold mt-2">${items[k].n}</p>
                <button onclick="cM('${k}')" class="bg-black text-white w-full rounded mt-2">Add</button>
            </div>`).join('');
    };

    const filterCategory = (cat) => {
        const filtered = Object.fromEntries(Object.entries(d).filter(([k, v]) => v.cat === cat));
        rH(filtered);
    };

    const sD = (k) => {
        history.pushState({v: 'd'}, '');
        dc.innerHTML = `<img src="${d[k].i}" class="w-full"><p class="text-lg font-bold">${d[k].n}</p><p>$${d[k].p}</p>`;
        document.getElementById('m').classList.add('hidden');
        document.getElementById('det').classList.remove('hidden');
    };

    const cM = (k) => {
        mc.innerHTML = `<p>Add ${d[k].n} to cart?</p>`;
        mb.onclick = () => {
            c.push({...d[k], id: Date.now()});
            sA();
            mod.classList.add('hidden');
        };
        mod.classList.remove('hidden');
    };

    const sA = () => { localStorage.setItem('c', JSON.stringify(c)); uC(); };

    const uC = () => {
        cc.innerText = c.length;
        cl.innerHTML = c.map(i => `<p>${i.n} - $${i.p}</p>`).join('');
        ct.innerText = `Total: $${c.reduce((s, i) => s + i.p, 0).toFixed(2)}`;
    };

    const hS = (e) => {
        if (e.key == 'Enter') {
            let q = s.value.toLowerCase(), r = Object.keys(d).filter(k => d[k].n.toLowerCase().includes(q));
            home.classList.add('hidden');
            search.classList.remove('hidden');
            st.innerText = `Results for "${q}"`;
            sl.innerHTML = r.map(k => `<p onclick="sD('${k}')" class="cursor-pointer">${d[k].n}</p>`).join('');
        }
    };

    const clearS = () => { s.value = ''; home.classList.remove('hidden'); search.classList.add('hidden'); };

    window.onpopstate = () => location.reload();
    rH();
    uC();
</script>
</body>
</html>
