<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpLiftClean</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#F6F6F6] flex justify-center pb-12">
    <div class="w-full max-w-md bg-white min-h-screen shadow-2xl">
        <!-- Header -->
        <header class="p-6 border-b border-slate-50">
            <h1 class="font-bold text-2xl tracking-tight text-slate-900">UpLiftClean</h1>
            <p class="text-sm text-slate-500">Natural Purity, Powerful Opportunity.</p>
        </header>

        <!-- Product Grid -->
        <div class="p-4 grid grid-cols-2 gap-4">
            
            <!-- 1. The Complete Set -->
            <div class="border border-slate-100 rounded-2xl bg-white p-4 shadow-sm flex flex-col justify-between">
                <img src="thecompleteset.jpg" class="w-full h-32 object-contain mb-3" alt="The Complete Set">
                <div>
                    <h4 class="font-bold text-xs">The Complete Set</h4>
                    <p class="text-[9px] text-slate-400 mb-2">Full Organic Care</p>
                    <a href="https://m.me/upliftcleanofficial" class="block text-center bg-emerald-800 text-white text-[10px] py-2.5 rounded-lg font-bold">Order via Messenger</a>
                </div>
            </div>

            <!-- 2. Pure Prime -->
            <div class="border border-slate-100 rounded-2xl bg-white p-4 shadow-sm flex flex-col justify-between">
                <img src="pureprime.jpg" class="w-full h-32 object-contain mb-3" alt="Pure Prime">
                <div>
                    <h4 class="font-bold text-xs">Pure Prime Soap</h4>
                    <p class="text-[9px] text-slate-400 mb-2">Saponin Natural Soap</p>
                    <a href="https://m.me/upliftcleanofficial" class="block text-center bg-emerald-800 text-white text-[10px] py-2.5 rounded-lg font-bold">Order via Messenger</a>
                </div>
            </div>

            <!-- 3. Pure Plus -->
            <div class="border border-slate-100 rounded-2xl bg-white p-4 shadow-sm flex flex-col justify-between">
                <img src="pureplus.jpg" class="w-full h-32 object-contain mb-3" alt="Pure Plus">
                <div>
                    <h4 class="font-bold text-xs">Pure Plus Booster</h4>
                    <p class="text-[9px] text-slate-400 mb-2">Laundry Booster</p>
                    <a href="https://m.me/upliftcleanofficial" class="block text-center bg-emerald-800 text-white text-[10px] py-2.5 rounded-lg font-bold">Order via Messenger</a>
                </div>
            </div>

        </div>
    </div>

    <!-- Hidden Admin Entry -->
    <div class="fixed bottom-4 right-4 opacity-0 hover:opacity-100 transition-opacity">
        <button onclick="document.getElementById('admin-panel').classList.remove('hidden')" class="bg-slate-800 text-white text-[8px] px-2 py-1 rounded">Admin</button>
    </div>

    <div id="admin-panel" class="hidden fixed inset-0 bg-white p-8">
        <h2 class="text-xl font-bold mb-4">Command Center</h2>
        <input type="text" id="admin-code" placeholder="Secret Code" class="border p-2 w-full mb-4">
        <button onclick="window.print()" class="bg-black text-white px-4 py-2">Print Packing Slip</button>
    </div>
</body>
</html>
