<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpLiftClean | Organic Laundry Care</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#F6F6F6] text-slate-900 min-h-screen flex justify-center">

    <!-- Customer Facing App -->
    <div class="w-full max-w-md bg-white min-h-screen shadow-xl pb-10">
        <!-- Header -->
        <header class="p-6">
            <h1 class="font-bold text-2xl tracking-tight text-slate-900">UpLiftClean</h1>
            <p class="text-sm text-slate-500">Natural Purity, Powerful Opportunity.</p>
        </header>

        <!-- Product Grid -->
        <div class="px-6 grid grid-cols-2 gap-4">
            <!-- Product 1 -->
            <div class="border border-slate-100 rounded-2xl bg-white p-3 shadow-sm">
                <img src="1000052415.png" class="w-full h-32 object-contain rounded-lg mb-3" alt="Pure Power Set">
                <h4 class="font-bold text-xs">The Pure Power Set</h4>
                <a href="https://m.me/upliftcleanofficial" class="block text-center bg-emerald-800 text-white text-[10px] py-2 mt-3 rounded-lg font-bold">Order via Messenger</a>
            </div>
            <!-- Product 2 -->
            <div class="border border-slate-100 rounded-2xl bg-white p-3 shadow-sm">
                <img src="1000052416.jpg" class="w-full h-32 object-contain rounded-lg mb-3" alt="Pure Prime Soap">
                <h4 class="font-bold text-xs">Pure Prime Soap</h4>
                <a href="https://m.me/upliftcleanofficial" class="block text-center bg-emerald-800 text-white text-[10px] py-2 mt-3 rounded-lg font-bold">Order via Messenger</a>
            </div>
        </div>
    </div>

    <!-- Hidden Admin Trigger (Invisible to customers) -->
    <div class="fixed bottom-2 right-2 opacity-0 hover:opacity-100 transition-opacity">
        <button onclick="showAdmin()" class="bg-slate-200 text-[8px] px-2 py-1 rounded">Admin</button>
    </div>

    <script>
        function showAdmin() {
            const code = prompt("Enter Admin Code:");
            if (code === "YOUR-ADMIN-PASSWORD") { // Change this to your password
                window.location.href = "admin-panel.html"; // Your hidden page
            }
        }
    </script>
</body>
</html>
